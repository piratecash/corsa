name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            libxrender-dev \
            libxxf86vm-dev

      - name: Run lint
        run: make lint

  vuln:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: make vuln

  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    needs: lint
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            libxrender-dev \
            libxxf86vm-dev

      - name: Build binaries
        shell: bash
        run: |
          make build-node-linux-amd64
          make build-desktop-linux-amd64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corsa-linux
          path: dist/*
          if-no-files-found: error

  build-platforms:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runs_on: macos-latest
            build_cmds: |
              make build-node-macos-arm64
              make build-desktop-macos-arm64
          - name: macos-amd64
            runs_on: macos-15-intel
            build_cmds: |
              make build-node-macos-amd64
              make build-desktop-macos-amd64
          - name: windows
            runs_on: windows-latest
            build_cmds: |
              make build-node-windows-amd64
              make build-desktop-windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        shell: bash
        run: ${{ matrix.build_cmds }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corsa-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-platforms
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find release-artifacts -type f -exec cp {} dist/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
