name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            libxrender-dev \
            libxxf86vm-dev

      - name: Run lint
        run: make lint

  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            libxrender-dev \
            libxxf86vm-dev

      - name: Build binaries
        shell: bash
        run: |
          make build-node-linux-amd64
          make build-desktop-linux-amd64

      - name: Package Linux artifacts
        shell: bash
        run: |
          mkdir -p release
          tar -cjf release/corsa-linux-amd64.tar.bz2 -C dist \
            corsa-node-linux-amd64 \
            corsa-desktop-linux-amd64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corsa-linux
          path: release/corsa-linux-amd64.tar.bz2
          if-no-files-found: error

  build-platforms:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runs_on: macos-latest
            build_cmds: |
              make build-node-macos-arm64
              make build-desktop-macos-arm64
          - name: macos-amd64
            runs_on: macos-15-intel
            build_cmds: |
              make build-node-macos-amd64
              make build-desktop-macos-amd64
          - name: windows
            runs_on: windows-latest
            build_cmds: |
              make build-node-windows-amd64
              make build-desktop-windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        shell: bash
        run: ${{ matrix.build_cmds }}

      - name: Package macOS artifacts
        if: startsWith(matrix.name, 'macos-')
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.name }}" = "macos-arm64" ]; then
            tar -cjf release/corsa-darwin-arm64.tar.bz2 -C dist \
              corsa-node-darwin-arm64 \
              corsa-desktop-darwin-arm64
          else
            tar -cjf release/corsa-darwin-amd64.tar.bz2 -C dist \
              corsa-node-darwin-amd64 \
              corsa-desktop-darwin-amd64
          fi

      - name: Package Windows artifacts
        if: matrix.name == 'windows'
        shell: bash
        run: |
          mkdir -p release
          powershell -Command "Compress-Archive -Path dist/corsa-node-windows-amd64.exe,dist/corsa-desktop-windows-amd64.exe -DestinationPath release/corsa-windows-amd64.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corsa-${{ matrix.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-platforms
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find release-artifacts -type f -exec cp {} dist/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
