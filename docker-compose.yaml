services:
  corsa-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corsa-node
    restart: unless-stopped
    ports:
      - "64646:64646"
    #  - "46464:46464"
    environment:
      CORSA_LISTEN_ADDRESS: ":64646"
      # CORSA_ADVERTISE_PORT overrides the self-reported listening port sent
      # in hello.advertise_port. Accepts 1..65535; empty / invalid values
      # fall back to the built-in default (64646). Set this whenever the
      # externally dialable port is NOT 64646 — the runtime never derives
      # advertise_port from CORSA_LISTEN_ADDRESS, so a node bound to
      # ":64647" with no NAT still advertises 64646 and is undialable
      # until CORSA_ADVERTISE_PORT=64647 is set. The same rule covers the
      # NAT / port-forward / reverse-proxy case where the public dial
      # port differs from the bind port. There is no CORSA_ADVERTISE_ADDRESS
      # env knob in this build: the local node's external host is no
      # longer wire-published. Neighbours announce this node to others
      # using the observed TCP source host of the inbound connection plus
      # this CORSA_ADVERTISE_PORT, so the operator never has to declare
      # an external IP. See docs/protocol/handshake.md.
      # CORSA_ADVERTISE_PORT: "64646"
      CORSA_BOOTSTRAP_PEERS: "65.108.204.190:64646"
      CORSA_RPC_HOST: "0.0.0.0"
      CORSA_RPC_PORT: "46464"
      # CORSA_RPC_USERNAME: ""
      # CORSA_RPC_PASSWORD: ""
    volumes:
      - corsa-data:/home/corsa/.corsacore

volumes:
  corsa-data:
